# GeoGuardGS base config. Paths are intentionally relative for server migration.
workspace: .
source_path: data/waymo/002
model_path: outputs/default_run
mode: train
task: waymo
exp_name: geoguardgs
gpus: [0]
resume: false

data:
  type: Waymo
  split_train: 1
  split_test: -1
  white_background: false
  selected_frames: [0, 198]
  cameras: [0, 1, 2, 3, 4]
  extent: 10
  use_colmap: false
  filter_colmap: false
  use_colmap_pose: false
  colmap_executable: ""
  initialization_note: lidar_pointcloud_initialization
  allow_lidar_initialization: true
  require_no_lidar_initialization: false
  shuffle: true
  eval: true
  images: images
  use_semantic: false
  use_mono_depth: false
  use_mono_normal: false

model:
  gaussian:
    sh_degree: 1
    fourier_dim: 5
    fourier_scale: 1.0
    flip_prob: 0.5
  nsg:
    include_bkgd: true
    include_obj: true
    include_sky: true
    opt_track: true

render:
  fps: 24
  concat_cameras: [1, 0, 2]

train:
  iterations: 30000
  test_iterations: [
    1000, 2000, 3000, 4000, 5000,
    6000, 7000, 8000, 9000, 10000,
    11000, 12000, 13000, 14000, 15000,
    16000, 17000, 18000, 19000, 20000,
    21000, 22000, 23000, 24000, 25000,
    26000, 27000, 28000, 29000, 30000
  ]
  save_iterations: [
    1000, 2000, 3000, 4000, 5000,
    6000, 7000, 8000, 9000, 10000,
    11000, 12000, 13000, 14000, 15000,
    16000, 17000, 18000, 19000, 20000,
    21000, 22000, 23000, 24000, 25000,
    26000, 27000, 28000, 29000, 30000
  ]
  checkpoint_iterations: [
    1000, 2000, 3000, 4000, 5000,
    6000, 7000, 8000, 9000, 10000,
    11000, 12000, 13000, 14000, 15000,
    16000, 17000, 18000, 19000, 20000,
    21000, 22000, 23000, 24000, 25000,
    26000, 27000, 28000, 29000, 30000
  ]
  disable_structure_updates: false
  scalar_trace_path: metrics/train_loss_trace.csv
  save_visuals: false
  log_image_interval: 0
  log_fixed_view: true
  log_fixed_view_ids: []
  periodic_eval_enabled: true
  periodic_eval_interval: 1000
  periodic_eval_view_ids: []
  periodic_eval_views_per_camera: 3
  periodic_eval_max_views: 15
  psnr_drop_warn_threshold: 5.0

  guided_feedback:
    enabled: false
    supervision_mode: lidar_supervised
    use_lidar_depth: true
    use_da3_structure: false
    assert_no_lidar_supervision: false
    feedback_mode: region
    region_weight: 2.0
    geometry_weight: 1.0
    da3_edge_weight: 1.0
    da3_ranking_weight: 1.0
    da3_side_weight: 0.5

  feedback_controller:
    enabled: false
    mode: "off"
    start_iter: 1000
    interval: 500
    max_triggers: -1
    risk_source: da3_boundary
    supervision_mode: da3_unsupervised
    feedback_mode: "none"
    repair_mode: "none"
    output_dir: ""
    max_regions: 30
    max_pixels_per_region: 64
    top_contributors: 8
    contribution_source: live_current_model
    use_cached_if_exists: false
    recompute_risk: true
    recompute_contribution: true
    recompute_responsible_groups: true
    recompute_softpatch: true
    run_counterfactual: false
    run_candidate_tagging: true
    fail_policy: warn
    allow_parameter_modification: false

  gaussian_control:
    enabled: false
    control_mode: "off"
    evidence_source: auto
    risk_source: da3_boundary
    supervision_mode: da3_unsupervised
    counterfactual_objective: da3_structure
    group_source: feedback_controller
    allow_parameter_modification: false
    allow_real_prune: false
    allow_real_split: false
    allow_real_shrink: false
    opacity_reg_weight: 0.0
    opacity_decay_factor: 0.95
    max_decay_gaussians_per_trigger: 10
    max_decay_ratio: 0.00005
    max_controlled_gaussians: 256
    min_group_confidence: 0.0
    min_multiview_support: 1
    min_support_pixels: 8
    rgb_safety_threshold: 0.02
    protect_good_groups: true
    skip_low_evidence: true

geovit:
  enabled: false
  model_name: depth-anything/DA3-LARGE-1.1
  model_dir: weights/da3/DA3-LARGE-1.1
  local_files_only: true
  device: cuda
  process_res: 128

optim:
  prune_box_interval: 100
  densification_interval: 100
  densify_from_iter: 500
  densify_grad_threshold_bkgd: 0.0006
  densify_grad_abs_bkgd: true
  densify_grad_threshold_obj: 0.0002
  densify_grad_abs_obj: false
  densify_grad_threshold: 0.0002
  densify_until_iter: 25000
  feature_lr: 0.0025
  max_screen_size: 20
  min_opacity: 0.005
  opacity_lr: 0.05
  opacity_reset_interval: 3000
  percent_big_ws: 0.1
  percent_dense: 0.01
  position_lr_delay_mult: 0.01
  position_lr_final: 1.6e-06
  position_lr_init: 0.00016
  position_lr_max_steps: 30000
  rotation_lr: 0.001
  scaling_lr: 0.005
  semantic_lr: 0.01
  lambda_l1: 1.0
  lambda_dssim: 0.2
  lambda_sky: 0.05
  lambda_sky_scale: [1, 1, 0, 0, 0]
  lambda_mask: 0.1
  lambda_reg: 0.1
  lambda_depth_lidar: 0.0
  lambda_color_correction: 0.0
  track_position_lr_delay_mult: 0.01
  track_position_lr_init: 0.005
  track_position_lr_final: 5.0e-5
  track_position_max_steps: 30000
  track_rotation_lr_delay_mult: 0.01
  track_rotation_lr_init: 0.001
  track_rotation_lr_final: 1.0e-5
  track_rotation_max_steps: 30000
